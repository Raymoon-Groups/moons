services:
  postgres:
    image: postgres:16-alpine
    container_name: moons-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: moons
      POSTGRES_PASSWORD: moons
      POSTGRES_DB: moons
    volumes:
      - moons_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moons -d moons"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moons-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - moons_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  moons_pg_data:
  moons_redis_data:
